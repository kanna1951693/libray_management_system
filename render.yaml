services:
  - type: web
    name: library-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: library-db
    databaseName: library_db
    plan: free
